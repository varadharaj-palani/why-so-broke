name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/why-so-broke-backend:latest

      - name: Run Alembic migrations (prod DB)
        run: |
          docker run --rm \
            -e DATABASE_URL="${{ secrets.NEON_PROD_DATABASE_URL }}" \
            -e DATABASE_SYNC_URL="${{ secrets.NEON_PROD_SYNC_DATABASE_URL }}" \
            --entrypoint "" \
            ghcr.io/${{ github.repository_owner }}/why-so-broke-backend:latest \
            alembic upgrade head

      - name: Deploy to Koyeb (prod backend)
        uses: koyeb/action-git-deploy@v1
        with:
          api-token: ${{ secrets.KOYEB_API_TOKEN }}
          app-name: why-so-broke
          service-name: backend
          docker: ghcr.io/${{ github.repository_owner }}/why-so-broke-backend:latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.KOYEB_PROD_URL }}/api/v1
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=why-so-broke --branch=main
