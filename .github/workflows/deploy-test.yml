name: Deploy to Test

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/why-so-broke-backend:test

      - name: Run Alembic migrations (test DB)
        run: |
          docker run --rm \
            -e DATABASE_URL="${{ secrets.NEON_TEST_DATABASE_URL }}" \
            -e DATABASE_SYNC_URL="${{ secrets.NEON_TEST_SYNC_DATABASE_URL }}" \
            --entrypoint "" \
            ghcr.io/${{ github.repository_owner }}/why-so-broke-backend:test \
            alembic upgrade head

      - name: Deploy to Render (test backend)
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.RENDER_TEST_URL }}/api/v1
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to Cloudflare Pages (test preview)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=why-so-broke-test --branch=develop --commit-dirty=true
