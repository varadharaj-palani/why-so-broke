<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients for depth -->
  <defs>
    <linearGradient id="pigGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle for contrast -->
  <circle cx="64" cy="64" r="64" fill="#f8fafc"/>

  <!-- Piggy body -->
  <ellipse cx="64" cy="70" rx="32" ry="28" fill="url(#pigGradient)"/>

  <!-- Piggy head -->
  <circle cx="64" cy="38" r="20" fill="url(#pigGradient)"/>

  <!-- Piggy snout -->
  <ellipse cx="78" cy="40" rx="8" ry="6" fill="#047857"/>

  <!-- Snout details (nostrils) -->
  <circle cx="75" cy="39" r="1.5" fill="#064e3b"/>
  <circle cx="81" cy="39" r="1.5" fill="#064e3b"/>

  <!-- Ear -->
  <ellipse cx="50" cy="22" rx="6" ry="10" fill="url(#pigGradient)" transform="rotate(-25 50 22)"/>

  <!-- Eye -->
  <circle cx="58" cy="35" r="2.5" fill="#064e3b"/>
  <circle cx="58" cy="35" r="1" fill="#ffffff"/>

  <!-- Coin slot on back -->
  <rect x="58" y="58" width="12" height="3" rx="1.5" fill="#064e3b"/>

  <!-- Legs -->
  <rect x="48" y="90" width="6" height="18" rx="3" fill="#047857"/>
  <rect x="60" y="90" width="6" height="18" rx="3" fill="#047857"/>
  <rect x="72" y="90" width="6" height="18" rx="3" fill="#047857"/>
  <rect x="84" y="90" width="6" height="18" rx="3" fill="#047857"/>

  <!-- Tail (small curl) -->
  <path d="M 92 68 Q 100 65 102 60" stroke="#047857" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Floating coin (to the right, suggesting savings/money) -->
  <circle cx="105" cy="48" r="8" fill="url(#coinGradient)"/>
  <circle cx="105" cy="48" r="7.5" fill="none" stroke="#d97706" stroke-width="0.5"/>

  <!-- Coin inner circle -->
  <circle cx="105" cy="48" r="5" fill="none" stroke="#d97706" stroke-width="1" opacity="0.6"/>

  <!-- Sparkle near coin (money vibes) -->
  <circle cx="98" cy="38" r="1.5" fill="#fbbf24"/>
  <circle cx="112" cy="42" r="1" fill="#fbbf24"/>
</svg>
